# Spring application name
spring.application.name: offer-engine-promotions

# Server
server.port=8080

# Enable Virtual Threads for high-concurrency without thread-pool exhaustion
spring.threads.virtual.enabled=true

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?reWriteBatchedInserts=true
spring.datasource.username=postgres
spring.datasource.password=pgP@ssw0rd
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool (Optimized for Both Batch and Read Operations)
# Issue #7: Increased pool size to 50 to handle high concurrent read workloads (evaluation queries)
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.auto-commit=false
# Issue #5: Set query timeout to 5 seconds to prevent cascading failures from slow queries
spring.datasource.hikari.connection-init-sql=SET statement_timeout = '5s'

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.username= default
spring.data.redis.password= r3d!sP@ssw0rd

# Spring Batch
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

